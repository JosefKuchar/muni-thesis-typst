[package]
name = "fi-muni-thesis"
version = "1.0.0"
entrypoint = "lib.typ"
authors = ["Josef Kuchař", "OpenAI Codex"]
license = "MIT"
description = "Masaryk University Faculty of Informatics thesis template matching the fithesis4 LaTeX layout."
categories = ["thesis"]
keywords = ["masaryk university", "faculty of informatics", "thesis"]
compiler = "0.14.0"
exclude = [
  "/AGENTS.md",
  "/compare/",
  "/example/output.pdf",
  "/scripts/",
  "/tex-rendered.pdf",
  "/tex-source/",
]

[template]
path = "template"
entrypoint = "main.typ"
